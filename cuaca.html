<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUACA.ID • Prakiraan Cuaca Indonesia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e1b4b; }
        .weather-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .glass-select { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); border: 1px solid #e2e8f0; }
        select { appearance: none; cursor: pointer; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .float-img { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="pb-32">

    <nav class="p-6 bg-white border-b border-slate-100 sticky top-0 z-50 backdrop-blur-sm bg-white/90">
        <div class="container mx-auto flex justify-between items-center max-w-6xl">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg shadow-blue-100">
                    <i class="fas fa-cloud text-xs"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tighter text-slate-800">CUACA<span class="text-blue-600">.ID</span></span>
            </div>
            <div id="clock" class="px-4 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-bold border border-blue-100 font-mono">00:00:00</div>
        </div>
    </nav>

    <div class="container mx-auto px-6 mt-10 max-w-6xl">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-10">
            <select id="prov" onchange="loadRegencies(this.value)" class="glass-select p-3 rounded-2xl text-xs font-bold text-slate-600 outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">PROVINSI</option>
            </select>
            <select id="kota" onchange="loadDistricts(this.value)" disabled class="glass-select p-3 rounded-2xl text-xs font-bold text-slate-600 outline-none disabled:opacity-50">
                <option value="">KOTA/KAB</option>
            </select>
            <select id="kec" onchange="loadVillages(this.value)" disabled class="glass-select p-3 rounded-2xl text-xs font-bold text-slate-600 outline-none disabled:opacity-50">
                <option value="">KECAMATAN</option>
            </select>
            <select id="desa" onchange="fetchWeather(this.value)" disabled class="glass-select p-3 rounded-2xl text-xs font-bold text-slate-600 outline-none disabled:opacity-50">
                <option value="">DESA/KEL</option>
            </select>
        </div>

        <div id="loader" class="hidden text-center py-20">
            <i class="fas fa-circle-notch fa-spin text-3xl text-blue-500 mb-4"></i>
            <p class="text-slate-400 font-bold text-xs uppercase tracking-widest">Sinkronisasi BMKG...</p>
        </div>

        <div id="weatherContent" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1">
                <div class="weather-gradient rounded-[2.5rem] p-8 text-white shadow-2xl shadow-blue-100 relative overflow-hidden h-full flex flex-col justify-between">
                    <div class="relative z-10">
                        <div class="flex justify-between items-start mb-8">
                            <span id="wTimeLabel" class="px-3 py-1 bg-white/20 rounded-full text-[10px] font-bold tracking-widest uppercase">Memuat...</span>
                            <i class="fas fa-ellipsis-h opacity-50"></i>
                        </div>
                        <h2 id="displayLoc" class="text-3xl font-black leading-tight mb-2 uppercase tracking-tighter">Pilih Lokasi</h2>
                        <div class="flex items-center gap-2">
                            <span id="wTemp" class="text-8xl font-black tracking-tighter">--</span>
                            <span class="text-3xl font-light opacity-70 mt-[-2rem]">°C</span>
                        </div>
                        <p id="wDesc" class="text-xl font-bold opacity-90 mt-2">--</p>
                    </div>
                    <div id="wIconContainer" class="relative z-10 flex justify-center py-6">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl">
                        <i class="fas fa-tint text-blue-500 mb-4 text-2xl"></i>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1">Kelembapan</p>
                        <p id="wHumid" class="text-3xl font-black text-slate-800">--%</p>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl">
                        <i class="fas fa-wind text-blue-500 mb-4 text-2xl"></i>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1">Kecepatan Angin</p>
                        <p id="wWind" class="text-3xl font-black text-slate-800">-- <small class="text-sm">km/h</small></p>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl">
                        <i class="fas fa-cloud text-blue-500 mb-4 text-2xl"></i>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1">Tutupan Awan</p>
                        <p id="wCloud" class="text-3xl font-black text-slate-800">--%</p>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl">
                        <i class="fas fa-eye text-blue-500 mb-4 text-2xl"></i>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1">Jarak Pandang</p>
                        <p id="wVis" class="text-3xl font-black text-slate-800">--</p>
                    </div>
                </div>
                
                <div class="bg-blue-600 p-6 rounded-3xl text-white flex items-center gap-4 shadow-lg shadow-blue-100">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                        <i class="fas fa-info-circle"></i>
                    </div>
                    <p class="text-xs font-medium leading-relaxed">Data diperbarui secara real-time dari server BMKG Indonesia untuk tingkat akurasi kelurahan.</p>
                </div>
            </div>

        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 px-8 py-5 flex justify-between items-center z-50 max-w-md mx-auto rounded-t-3xl shadow-2xl md:max-w-xl">
        <a href="libur.html" class="flex flex-col items-center text-slate-300 hover:text-indigo-600 transition-colors">
            <i class="fas fa-calendar-day text-xl"></i>
            <span class="text-[10px] font-bold mt-1.5 uppercase tracking-tighter">Libur</span>
        </a>
        <a href="#" class="flex flex-col items-center text-blue-600">
            <i class="fas fa-cloud-sun text-xl"></i>
            <span class="text-[10px] font-bold mt-1.5 uppercase tracking-tighter">Cuaca</span>
        </a>
        <a href="gempa.html" class="flex flex-col items-center text-slate-300 hover:text-red-600 transition-colors">
            <i class="fas fa-house-damage text-xl"></i>
            <span class="text-[10px] font-bold mt-1.5 uppercase tracking-tighter">Gempa</span>
        </a>
    </div>

    <script>
        const REGION_API = 'https://api.cors.lol/?url=https://api-wilayah-indonesia/api';

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }
        setInterval(updateClock, 1000);

        // API Wilayah
        async function loadProvinces() {
            const res = await fetch(`${REGION_API}/provinces.json`);
            const data = await res.json();
            const el = document.getElementById('prov');
            data.forEach(p => el.innerHTML += `<option value="${p.id}">${p.name}</option>`);
        }

        async function loadRegencies(id) {
            reset(['kota', 'kec', 'desa']);
            if(!id) return;
            const res = await fetch(`${REGION_API}/regencies/${id}.json`);
            const data = await res.json();
            fill('kota', data);
        }

        async function loadDistricts(id) {
            reset(['kec', 'desa']);
            if(!id) return;
            const res = await fetch(`${REGION_API}/districts/${id}.json`);
            const data = await res.json();
            fill('kec', data);
        }

        async function loadVillages(id) {
            reset(['desa']);
            if(!id) return;
            const res = await fetch(`${REGION_API}/villages/${id}.json`);
            const data = await res.json();
            fill('desa', data);
        }

        function fill(id, data) {
            const el = document.getElementById(id);
            el.disabled = false;
            data.forEach(item => el.innerHTML += `<option value="${item.id}">${item.name}</option>`);
        }

        function reset(ids) {
            ids.forEach(id => {
                const el = document.getElementById(id);
                el.innerHTML = `<option value="">${id.toUpperCase()}</option>`;
                el.disabled = true;
            });
        }

        // API BMKG
        async function fetchWeather(villageId) {
            if(!villageId) return;
            
            // Format ID untuk BMKG (biasanya butuh titik pemisah)
            // Contoh emsifa: 3201010001 -> BMKG: 32.01.01.0001
            const formattedId = villageId.match(/.{1,2}/g).join('.');

            document.getElementById('weatherContent').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');

            try {
                const res = await fetch(`https://api.bmkg.go.id/publik/prakiraan-cuaca?adm4=${formattedId}`);
                const json = await res.json();
                const data = json.data[0];
                const current = data.cuaca[0][0];

                document.getElementById('displayLoc').innerText = data.lokasi.desa;
                document.getElementById('wTemp').innerText = current.t;
                document.getElementById('wDesc').innerText = current.weather_desc;
                document.getElementById('wHumid').innerText = `${current.hu}%`;
                document.getElementById('wWind').innerText = current.ws;
                document.getElementById('wCloud').innerText = `${current.tcc}%`;
                document.getElementById('wVis').innerText = current.vs_text;
                document.getElementById('wTimeLabel').innerText = current.local_datetime.split(' ')[1].substring(0,5);
                document.getElementById('wIconContainer').innerHTML = `<img src="${current.image}" class="w-40 h-40 float-img">`;

            } catch (err) {
                alert("Data wilayah ini belum tersedia di server BMKG.");
            } finally {
                document.getElementById('weatherContent').classList.remove('hidden');
                document.getElementById('loader').classList.add('hidden');
            }
        }

        window.onload = loadProvinces;
    </script>
</body>
</html>
